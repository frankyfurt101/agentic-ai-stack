# Infra for the agent stack: memory (pgvector + qdrant + redis) and tracing (langfuse).
# Bring up only what the chosen design needs. Copy to repo root and `docker compose up`.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent          # TODO: move to .env / secrets for anything real
      POSTGRES_DB: agentmemory
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrantdata:/qdrant/storage"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  langfuse:
    image: langfuse/langfuse:latest
    depends_on: [postgres]
    environment:
      DATABASE_URL: postgresql://agent:agent@postgres:5432/agentmemory
      NEXTAUTH_SECRET: changeme         # TODO: generate a real secret
      SALT: changeme                    # TODO: generate a real salt
      NEXTAUTH_URL: http://localhost:3000
    ports: ["3000:3000"]

volumes:
  pgdata:
  qdrantdata:
